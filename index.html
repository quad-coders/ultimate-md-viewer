<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Markdown Viewer</title>
    <link rel="stylesheet" href="styles.css" />
    <script>
      window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };
    </script>
    <script defer src="/_vercel/insights/script.js"></script>
    <script src="vendor/dompurify.min.js" defer></script>
    <script src="vendor/marked.umd.js" defer></script>
    <script src="vendor/mermaid.min.js" defer></script>
    <script src="app.js" defer></script>
  </head>
  <body>
    <div class="app-shell" id="app-shell">
      <div class="workspace">
        <aside class="sidebar" id="sidebar">
          <div class="sidebar-header">
            <div class="sidebar-header-row">
              <div class="sidebar-actions">
                <details class="picker-menu" id="picker-menu">
                  <summary
                    class="icon-button picker-summary"
                    aria-label="Open file or folder"
                    title="Open file or folder"
                  >
                    <svg
                      class="button-icon"
                      viewBox="0 0 24 24"
                      aria-hidden="true"
                    >
                      <path
                        d="M3.5 8.25A1.75 1.75 0 0 1 5.25 6.5H9l1.8 2.1h8A1.75 1.75 0 0 1 20.55 10v7.75A1.75 1.75 0 0 1 18.8 19.5H5.25A1.75 1.75 0 0 1 3.5 17.75z"
                        fill="none"
                        stroke="currentColor"
                        stroke-linecap="round"
                        stroke-linejoin="round"
                        stroke-width="1.6"
                      />
                      <path
                        d="M12 15.5V10"
                        fill="none"
                        stroke="currentColor"
                        stroke-linecap="round"
                        stroke-linejoin="round"
                        stroke-width="1.6"
                      />
                      <path
                        d="m9.75 12.25 2.25-2.25 2.25 2.25"
                        fill="none"
                        stroke="currentColor"
                        stroke-linecap="round"
                        stroke-linejoin="round"
                        stroke-width="1.6"
                      />
                    </svg>
                  </summary>

                  <div class="picker-popover">
                    <button class="picker-option" id="open-file-button" type="button">
                      File
                    </button>
                    <button
                      class="picker-option"
                      id="open-folder-button"
                      type="button"
                    >
                      Folder
                    </button>
                  </div>
                </details>

                <select
                  id="sort-mode"
                  class="sort-select"
                  aria-label="Sort navigation items"
                  title="Sort navigation items"
                >
                  <option value="added">Added</option>
                  <option value="name">Name</option>
                </select>
              </div>
              <button
                class="icon-button collapse-toggle"
                id="collapse-toggle"
                type="button"
                aria-label="Collapse sidebar"
                title="Collapse sidebar"
              >
                <svg class="button-icon" viewBox="0 0 24 24" aria-hidden="true">
                  <path
                    d="M6.5 5.5v13"
                    fill="none"
                    stroke="currentColor"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    stroke-width="1.8"
                  />
                  <path
                    d="m15.75 8.25-4 3.75 4 3.75"
                    fill="none"
                    stroke="currentColor"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    stroke-width="1.8"
                  />
                </svg>
              </button>
            </div>
          </div>

          <div class="drop-zone" id="drop-zone">
            <ul class="nav-list" id="nav-list"></ul>
            <div class="nav-empty" id="nav-empty">
              Open or drop Markdown files and folders here.
            </div>
          </div>
        </aside>

        <div
          class="sidebar-resizer"
          id="sidebar-resizer"
          aria-hidden="true"
          title="Resize sidebar"
        ></div>

        <main class="main-content" id="main-content">
          <button
            class="sidebar-restore"
            id="sidebar-restore"
            type="button"
            aria-label="Expand sidebar"
            title="Expand sidebar"
          >
            <svg class="button-icon" viewBox="0 0 24 24" aria-hidden="true">
              <path
                d="M17.5 5.5v13"
                fill="none"
                stroke="currentColor"
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="1.8"
              />
              <path
                d="m8.25 8.25 4 3.75-4 3.75"
                fill="none"
                stroke="currentColor"
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="1.8"
              />
            </svg>
          </button>

          <article class="markdown-body" id="content">
            <div class="empty-state">
              <h1>Markdown Viewer</h1>
              <p>Open a Markdown file or folder from the left sidebar.</p>
            </div>
          </article>
        </main>
      </div>
    </div>

    <input
      id="file-input"
      type="file"
      accept=".md,.markdown,.mdown,.mkd,.mkdn"
      multiple
      hidden
    />
    <input
      id="folder-input"
      type="file"
      accept=".md,.markdown,.mdown,.mkd,.mkdn"
      webkitdirectory
      directory
      multiple
      hidden
    />
  </body>
</html>
